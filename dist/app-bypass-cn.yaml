# app-bypass-cn.yaml — bypass list for users in China.
# Migrated 2026-05-26 from kaitu-io/k2app webapp/src/utils/regionalAppDetection/china.ts.
#
# Consumed by k2 engine (k2/appbypass package) via the same CDN that ships
# .k2b bundles. Schema v1; reader gates on version + region == filename.
#
# Maintenance guidelines:
#   - installer_exact / package_exact entries are case-sensitive reverse-domain
#     identifiers — copy them verbatim from PackageManager output.
#   - package_prefix entries MUST end with a dot so `com.tencent.` doesn't
#     accidentally match `com.tencentX.foo`.
#   - desktop entries are matched case-insensitive; one entry covers all three
#     desktop platforms (macOS helper basename, Windows exe basename, Linux
#     /proc/comm). Keep desktop list conservative — over-broad prefixes break
#     non-Chinese apps with the same vendor namespace.

version: 1
region: cn
description: |
  Bypass list for users in China. Routes Chinese-ecosystem apps direct
  while the rest of the traffic continues through the VPN tunnel.

# ── Android ─────────────────────────────────────────────────────────
android:
  installer_exact:
    - com.xiaomi.market
    - com.huawei.appmarket
    - com.bbk.appstore
    - com.oppo.market
    - com.heytap.market
    - com.tencent.android.qqdownloader
    - com.qihoo.appstore
    - com.baidu.appsearch
    - com.wandoujia.phoenix2
    - com.lenovo.leos.appstore
    - com.coolapk.market

  package_exact:
    - com.eg.android.AlipayGphone
    - com.UCMobile
    - com.smile.gifmaker

  package_prefix:
    # Tier-1 internet
    - com.tencent.
    - com.alipay.
    - com.alibaba.
    - com.taobao.
    - com.tmall.
    - com.baidu.
    - com.bytedance.
    - com.ss.android.
    - com.netease.
    - com.youdao.
    - com.sina.
    - com.weibo.
    - com.qihoo.
    - com.qihoo360.
    # OEM Chinese-side
    - com.miui.
    - com.xiaomi.
    - com.huawei.
    - com.bbk.
    - com.oppo.
    - com.heytap.
    # Tools / content
    - com.iflytek.
    - com.autonavi.
    - com.amap.
    - com.qiyi.
    - com.iqiyi.
    - com.youku.
    - com.bilibili.
    - com.zhihu.
    # Lifestyle / transport
    - com.meituan.
    - com.dianping.
    - com.didi.
    - com.didichuxing.
    - com.kuaishou.
    # E-commerce
    - com.jingdong.
    - com.jd.
    # Banking
    - com.cmbchina.
    - cmb.
    - com.icbc.
    - com.ICBC.
    - com.ccb.
    - com.boc.

# ── Desktop (macOS + Windows + Linux, case-insensitive matcher) ────
# Top-6 high-confidence Chinese-ecosystem desktop apps. Conservative
# starting set — expand only after user-reported false-positives stay
# at zero for the existing entries.
desktop:
  process_prefix:
    - WeChat       # mac: WeChat / WeChatHelper / WeChatAppEx; win: WeChat.exe / WeChatStart.exe; linux: wechat
    - QQ           # win: QQ.exe; mac: QQ
    - DingTalk     # mac: DingTalk; win: DingTalk.exe
    - Tencent      # win: TencentMeeting.exe / TencentDocs.exe; mac: TencentMeeting
    - Alipay
    - Alibaba
