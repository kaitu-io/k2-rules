name: Daily Build

on:
  schedule:
    - cron: '30 0 * * *'  # UTC 00:30 (30 min after upstream rebuilds)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a release even if rule content is unchanged (use when a new ARTIFACT is added — e.g. all.krs.tar.gz — that content-diff would otherwise miss)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint app-bypass YAML presets
        run: go run ./tools/validate-app-bypass app-bypass

      - name: Run unit tests
        run: go test ./...

      - name: Build compiler
        run: go build -o k2-rules-gen .

      - name: Generate rule bundles
        run: ./k2-rules-gen -o dist

      - name: Show output
        run: ls -lh dist/

      - name: Build tarball + VERSION
        run: |
          # Bundle every published format: legacy .k2b + current .krs.
          # During the ~6 month transition both ship together; clients
          # pick whichever they know how to read.
          cd dist
          # all.krs.tar.gz: the single .krs archive the embed/build-fetch and the
          # embed-aware client consume. Phase A: k2-rules.tar.gz UNCHANGED (still
          # carries .krs) so pre-embed clients keep their source. Phase B (later)
          # strips .krs from k2-rules.tar.gz — see embedded-rules spec.
          tar -czf all.krs.tar.gz *.krs
          tar -czf k2-rules.tar.gz *.k2b *.krs
          ls -lh all.krs.tar.gz k2-rules.tar.gz
          # VERSION/change-detection keys on all.krs.tar.gz (the .krs set is what
          # matters now; .k2b is frozen legacy).
          printf '%s sha256:%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$(sha256sum all.krs.tar.gz | awk '{print $1}')" > VERSION
          cat VERSION

      - name: Verify archive split
        working-directory: dist
        run: |
          set -euo pipefail
          # Capture the listing ONCE. Do not pipe `tar | grep -q`: grep -q exits
          # on first match, closes the pipe, tar gets SIGPIPE, and `pipefail`
          # then fails the whole pipeline despite a successful match (the bug
          # that false-failed this step on 2026-06-01). Grep a here-string
          # instead — no pipe, no SIGPIPE.
          names=$(tar -tzf all.krs.tar.gz)
          # all.krs.tar.gz must contain every .krs and zero .k2b.
          krs_in_all=$(grep -c '\.krs$' <<<"$names" || true)
          k2b_in_all=$(grep -c '\.k2b$' <<<"$names" || true)
          echo "all.krs.tar.gz: ${krs_in_all} .krs, ${k2b_in_all} .k2b"
          [ "$krs_in_all" -ge 1 ] || { echo "FAIL: all.krs.tar.gz has no .krs"; exit 1; }
          [ "$k2b_in_all" -eq 0 ] || { echo "FAIL: all.krs.tar.gz must not contain .k2b"; exit 1; }
          # The reject feature depends on tencent-overseas.krs being in the archive.
          grep -qE '(^|/)tencent-overseas\.krs$' <<<"$names" \
            || { echo "FAIL: tencent-overseas.krs missing from all.krs.tar.gz"; exit 1; }
          echo "OK: archive split verified"

      - name: Check for changes
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          # Manual force: content-diff keys on bundle hashes only, so adding a
          # new artifact (all.krs.tar.gz) with unchanged rule content would be
          # skipped. force=true bypasses the diff to publish it.
          if [ "$FORCE" = "true" ]; then
            echo "Force requested — creating release regardless of content diff."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Download previous manifest (if any).
          PREV_MANIFEST=$(mktemp)
          if gh release download --pattern manifest.json -D "$(dirname "$PREV_MANIFEST")" -O "$PREV_MANIFEST" 2>/dev/null; then
            # Compare SHA256 hashes only (ignore version/date fields).
            OLD_HASHES=$(jq -S '.bundles | to_entries | map({key: .key, sha256: .value.sha256}) | sort_by(.key)' "$PREV_MANIFEST" 2>/dev/null || echo "[]")
            NEW_HASHES=$(jq -S '.bundles | to_entries | map({key: .key, sha256: .value.sha256}) | sort_by(.key)' dist/manifest.json)
            if [ "$OLD_HASHES" = "$NEW_HASHES" ]; then
              echo "No changes in rule data — skipping release."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Rule data changed — creating release."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No previous release found — creating first release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$PREV_MANIFEST"

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date -u +%Y.%m.%d)
          TAG="v${VERSION}"

          # Delete existing tag/release if re-running same day.
          gh release delete "${TAG}" --yes 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          # Create new release.
          # Upload every .k2b (legacy) and .krs (current) file in dist/ so the
          # country fleet (overseas + cn/ir/ru/tr/pk/vn/mm/eg/id/sa/ae/th/bd/by/tm/kz/uz)
          # is published without having to enumerate each bundle here.
          gh release create "${TAG}" \
            --title "Rules ${VERSION}" \
            --notes "Auto-generated from upstream sources. See ATTRIBUTION.md." \
            dist/*.k2b \
            dist/*.krs \
            dist/manifest.json \
            dist/all.krs.tar.gz \
            dist/k2-rules.tar.gz \
            dist/VERSION

      - name: Sync release branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stash the freshly-built artifacts (legacy .k2b + current .krs).
          # manifest.json is included so jsdelivr can serve it from @release;
          # the GitHub Release asset upload is the authoritative copy.
          mkdir -p /tmp/release-artifacts
          cp dist/*.k2b dist/*.krs dist/manifest.json dist/all.krs.tar.gz dist/k2-rules.tar.gz dist/VERSION /tmp/release-artifacts/

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Fetch + check out release branch (it was created by manual bootstrap).
          git fetch origin release
          git checkout release

          # Replace all contents with the freshly-built artifact set.
          # Release branch carries .k2b + .krs + manifest.json + tarball + VERSION; no source.
          # Wipe both tracked (git rm) and untracked (workspace leftovers from
          # earlier build steps — dist/, k2-rules-gen — that master ignores
          # via .gitignore but release branch does not).
          git rm -rf . 2>/dev/null || true
          rm -rf dist k2-rules-gen
          cp /tmp/release-artifacts/* .

          git add .
          if git diff --cached --quiet; then
            echo "no changes to release branch"
            exit 0
          fi
          git commit -m "nightly: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin release

      - name: Purge jsdelivr CDN cache
        if: steps.diff.outputs.changed == 'true'
        run: |
          # jsdelivr caches @release branch artifacts for up to 12h (s-maxage=43200).
          # A GET to purge.jsdelivr.net flushes the file across all jsdelivr edges
          # so the four POPs (cdn / fastly / testingcf / gcore) revalidate against
          # GitHub on next client fetch. Free public service, no auth required.
          base="https://purge.jsdelivr.net/gh/kaitu-io/k2-rules@release"
          paths=(all.krs.tar.gz k2-rules.tar.gz VERSION manifest.json)
          for f in dist/*.k2b; do paths+=("$(basename "$f")"); done
          for f in dist/*.krs; do paths+=("$(basename "$f")"); done
          for p in "${paths[@]}"; do
            echo "purge: $p"
            # 5s connect / 15s total — purge endpoint is best-effort, never fail the build
            curl -sS --max-time 15 --connect-timeout 5 -o /dev/null -w '  %{http_code}\n' "${base}/${p}" || echo "  (purge failed, non-fatal)"
          done
