name: Daily Build

on:
  schedule:
    - cron: '30 0 * * *'  # UTC 00:30 (30 min after upstream rebuilds)
  workflow_dispatch: {}    # manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint app-bypass YAML presets
        run: go run ./tools/validate-app-bypass app-bypass

      - name: Build compiler
        run: go build -o k2-rules-gen .

      - name: Generate rule bundles
        run: ./k2-rules-gen -o dist

      - name: Show output
        run: ls -lh dist/

      - name: Build tarball + VERSION
        run: |
          # Bundle .k2b + app-bypass-*.yaml so the client downloads both
          # in one shot. app-bypass-*.yaml lives next to .k2b in the
          # engine's runtime cache.
          cd dist
          tar -czf k2-rules.tar.gz *.k2b app-bypass-*.yaml
          ls -lh k2-rules.tar.gz
          printf '%s sha256:%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$(sha256sum k2-rules.tar.gz | awk '{print $1}')" > VERSION
          cat VERSION

      - name: Check for changes
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download previous manifest (if any).
          PREV_MANIFEST=$(mktemp)
          if gh release download --pattern manifest.json -D "$(dirname "$PREV_MANIFEST")" -O "$PREV_MANIFEST" 2>/dev/null; then
            # Compare SHA256 hashes only (ignore version/date fields).
            OLD_HASHES=$(jq -S '.bundles | to_entries | map({key: .key, sha256: .value.sha256}) | sort_by(.key)' "$PREV_MANIFEST" 2>/dev/null || echo "[]")
            NEW_HASHES=$(jq -S '.bundles | to_entries | map({key: .key, sha256: .value.sha256}) | sort_by(.key)' dist/manifest.json)
            if [ "$OLD_HASHES" = "$NEW_HASHES" ]; then
              echo "No changes in rule data — skipping release."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Rule data changed — creating release."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No previous release found — creating first release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$PREV_MANIFEST"

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date -u +%Y.%m.%d)
          TAG="v${VERSION}"

          # Delete existing tag/release if re-running same day.
          gh release delete "${TAG}" --yes 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          # Create new release.
          # Upload every .k2b file in dist/ so the country fleet (overseas +
          # cn/ir/ru/tr/pk/vn/mm/eg/id/sa/ae/th/bd/by/tm/kz/uz) is published without
          # having to enumerate each bundle here.
          gh release create "${TAG}" \
            --title "Rules ${VERSION}" \
            --notes "Auto-generated from upstream sources. See ATTRIBUTION.md." \
            dist/*.k2b \
            dist/app-bypass-*.yaml \
            dist/manifest.json \
            dist/k2-rules.tar.gz \
            dist/VERSION

      - name: Sync release branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stash the freshly-built artifacts
          mkdir -p /tmp/release-artifacts
          cp dist/*.k2b dist/k2-rules.tar.gz dist/VERSION /tmp/release-artifacts/
          # Include app-bypass YAML presets when present (no-op if dir empty).
          cp dist/app-bypass-*.yaml /tmp/release-artifacts/ 2>/dev/null || true

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Fetch + check out release branch (it was created by manual bootstrap).
          git fetch origin release
          git checkout release

          # Replace all contents with the freshly-built artifact set.
          # The release branch only contains .k2b + tarball + VERSION; no source.
          git rm -rf . 2>/dev/null || true
          cp /tmp/release-artifacts/* .

          git add .
          if git diff --cached --quiet; then
            echo "no changes to release branch"
            exit 0
          fi
          git commit -m "nightly: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin release

      - name: Purge jsdelivr CDN cache
        if: steps.diff.outputs.changed == 'true'
        run: |
          # jsdelivr caches @release branch artifacts for up to 12h (s-maxage=43200).
          # A GET to purge.jsdelivr.net flushes the file across all jsdelivr edges
          # so the four POPs (cdn / fastly / testingcf / gcore) revalidate against
          # GitHub on next client fetch. Free public service, no auth required.
          base="https://purge.jsdelivr.net/gh/kaitu-io/k2-rules@release"
          paths=(k2-rules.tar.gz VERSION manifest.json)
          for f in dist/*.k2b; do paths+=("$(basename "$f")"); done
          for f in dist/app-bypass-*.yaml; do
            [ -e "$f" ] || continue
            paths+=("$(basename "$f")")
          done
          for p in "${paths[@]}"; do
            echo "purge: $p"
            # 5s connect / 15s total — purge endpoint is best-effort, never fail the build
            curl -sS --max-time 15 --connect-timeout 5 -o /dev/null -w '  %{http_code}\n' "${base}/${p}" || echo "  (purge failed, non-fatal)"
          done
