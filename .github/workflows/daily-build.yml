name: Daily Build

on:
  schedule:
    - cron: '30 0 * * *'  # UTC 00:30 (30 min after upstream rebuilds)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a release even if rule content is unchanged (use when a new ARTIFACT is added — e.g. krs.tar.gz — that content-diff would otherwise miss)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint app-bypass YAML presets
        run: go run ./tools/validate-app-bypass app-bypass

      - name: Run unit tests
        run: go test ./...

      - name: Build compiler
        run: go build -o k2-rules-gen .

      - name: Generate rule bundles
        run: ./k2-rules-gen -o dist

      - name: Show output
        run: ls -lh dist/

      - name: Download previous manifest (for regression gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/prev
          gh release download --pattern manifest.json -D /tmp/prev 2>/dev/null || echo "no previous manifest (first release)"

      - name: Validate generated .krs bundles
        # Publish-time structural gate (constitution rule 4: "validate structure
        # at publish time"). Opens every .krs through the runtime mmap path AND
        # the heap reader and cross-checks them, so a structurally-broken or
        # index-less bundle can never reach the CDN — turning the deploy-ordering
        # trap (shipping krs.tar.gz without index sections) into a hard failure.
        # Also enforces a content gate: any region compiling to 0 rules, or cn
        # dropping below 80% of the previous release's ruleCount (PREV_MANIFEST),
        # fails the publish instead of silently routing the region to all-proxy.
        env:
          PREV_MANIFEST: /tmp/prev/manifest.json
        run: go run ./tools/validate-krs dist

      - name: Build tarball + VERSION
        run: |
          cd dist
          # Clean two-way split by consumer (no overlap):
          #   krs.tar.gz = *.krs  → embed-aware clients (v0.4.5+, fetch this name)
          #   k2-rules.tar.gz = *.k2b → released legacy clients (≤v0.4.4, read .k2b)
          # No released client reads .krs out of k2-rules.tar.gz: ≤v0.4.4 extract
          # only .k2b, and v0.4.5 (still unreleased) fetches krs.tar.gz, not
          # this file. So k2-rules.tar.gz carries .k2b ONLY — the earlier "carry
          # .krs too for no-stranding" was protecting a client that never shipped.
          # Retire k2-rules.tar.gz entirely once ≤v0.4.4 age out.
          tar -czf krs.tar.gz *.krs
          tar -czf k2-rules.tar.gz *.k2b
          ls -lh krs.tar.gz k2-rules.tar.gz
          # VERSION/change-detection keys on krs.tar.gz (the .krs set is what
          # matters now; .k2b is frozen legacy).
          printf '%s sha256:%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$(sha256sum krs.tar.gz | awk '{print $1}')" > VERSION
          cat VERSION

      - name: Verify archive split
        working-directory: dist
        run: |
          set -euo pipefail
          # Capture the listing ONCE. Do not pipe `tar | grep -q`: grep -q exits
          # on first match, closes the pipe, tar gets SIGPIPE, and `pipefail`
          # then fails the whole pipeline despite a successful match (the bug
          # that false-failed this step on 2026-06-01). Grep a here-string
          # instead — no pipe, no SIGPIPE.
          names=$(tar -tzf krs.tar.gz)
          # krs.tar.gz must contain every .krs and zero .k2b.
          krs_in_all=$(grep -c '\.krs$' <<<"$names" || true)
          k2b_in_all=$(grep -c '\.k2b$' <<<"$names" || true)
          echo "krs.tar.gz: ${krs_in_all} .krs, ${k2b_in_all} .k2b"
          [ "$krs_in_all" -ge 1 ] || { echo "FAIL: krs.tar.gz has no .krs"; exit 1; }
          [ "$k2b_in_all" -eq 0 ] || { echo "FAIL: krs.tar.gz must not contain .k2b"; exit 1; }
          # The reject feature depends on tencent-overseas.krs being in the archive.
          grep -qE '(^|/)tencent-overseas\.krs$' <<<"$names" \
            || { echo "FAIL: tencent-overseas.krs missing from krs.tar.gz"; exit 1; }
          # k2-rules.tar.gz is the inverse: legacy .k2b only, zero .krs (clean
          # split — no consumer crosses formats).
          legacy=$(tar -tzf k2-rules.tar.gz)
          k2b_in_legacy=$(grep -c '\.k2b$' <<<"$legacy" || true)
          krs_in_legacy=$(grep -c '\.krs$' <<<"$legacy" || true)
          echo "k2-rules.tar.gz: ${k2b_in_legacy} .k2b, ${krs_in_legacy} .krs"
          [ "$k2b_in_legacy" -ge 1 ] || { echo "FAIL: k2-rules.tar.gz has no .k2b"; exit 1; }
          [ "$krs_in_legacy" -eq 0 ] || { echo "FAIL: k2-rules.tar.gz must not contain .krs (clean split)"; exit 1; }
          echo "OK: archive split verified"

      - name: Check for changes
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          # Manual force: content-diff keys on bundle hashes only, so adding a
          # new artifact (krs.tar.gz) with unchanged rule content would be
          # skipped. force=true bypasses the diff to publish it.
          if [ "$FORCE" = "true" ]; then
            echo "Force requested — creating release regardless of content diff."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Download previous manifest (if any).
          PREV_MANIFEST=$(mktemp)
          if gh release download --pattern manifest.json -D "$(dirname "$PREV_MANIFEST")" -O "$PREV_MANIFEST" 2>/dev/null; then
            # Compare SHA256 hashes only (ignore version/date fields).
            OLD_HASHES=$(jq -S '.bundles | to_entries | map({key: .key, sha256: .value.sha256}) | sort_by(.key)' "$PREV_MANIFEST" 2>/dev/null || echo "[]")
            NEW_HASHES=$(jq -S '.bundles | to_entries | map({key: .key, sha256: .value.sha256}) | sort_by(.key)' dist/manifest.json)
            if [ "$OLD_HASHES" = "$NEW_HASHES" ]; then
              echo "No changes in rule data — skipping release."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Rule data changed — creating release."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No previous release found — creating first release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$PREV_MANIFEST"

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date -u +%Y.%m.%d)
          TAG="v${VERSION}"

          # Delete existing tag/release if re-running same day.
          gh release delete "${TAG}" --yes 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          # Create new release. Publish ONLY the four consumed artifacts — the
          # two tarballs plus manifest/VERSION. The loose per-country .k2b/.krs
          # files are intentionally NOT uploaded: no client (any 0.4.* or older)
          # ever fetches them individually — clients download a single tarball
          # and extract from inside it. They live only inside the tarballs now.
          gh release create "${TAG}" \
            --title "Rules ${VERSION}" \
            --notes "Auto-generated from upstream sources. See ATTRIBUTION.md." \
            dist/manifest.json \
            dist/krs.tar.gz \
            dist/k2-rules.tar.gz \
            dist/VERSION

      - name: Sync release branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stash the four published artifacts (the two tarballs + manifest +
          # VERSION). manifest.json is included so jsdelivr can serve it from
          # @release; the GitHub Release asset upload is the authoritative copy.
          # Loose per-country .k2b/.krs are NOT carried — nothing fetches them
          # individually; they live inside the tarballs.
          mkdir -p /tmp/release-artifacts
          cp dist/manifest.json dist/krs.tar.gz dist/k2-rules.tar.gz dist/VERSION /tmp/release-artifacts/

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Fetch + check out release branch (it was created by manual bootstrap).
          git fetch origin release
          git checkout release

          # Replace all contents with the freshly-built artifact set.
          # Release branch carries the 4 published artifacts only; no source,
          # no loose per-country bundles. The git rm below wipes any loose
          # .k2b/.krs left from earlier (pre-cleanup) nightlies.
          # Wipe both tracked (git rm) and untracked (workspace leftovers from
          # earlier build steps — dist/, k2-rules-gen — that master ignores
          # via .gitignore but release branch does not).
          git rm -rf . 2>/dev/null || true
          rm -rf dist k2-rules-gen
          cp /tmp/release-artifacts/* .

          git add .
          if git diff --cached --quiet; then
            echo "no changes to release branch"
            exit 0
          fi
          git commit -m "nightly: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin release

      - name: Purge + verify jsdelivr CDN consistency
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -uo pipefail
          # Why this gate exists: SHIPPED clients (<= v0.4.5) verify each downloaded
          # .krs against the per-region sha in the manifest they fetched. jsdelivr
          # serves a FRESH manifest.json + STALE krs.tar.gz on a subset of POPs (the
          # small files propagate, the 2.5MB tarball lags), so an old client pairs
          # new-manifest + old-tarball -> sha mismatch -> it keeps a stale/empty
          # cache -> degrades to all-proxy -> "cannot connect" (2026-06, #2960 et al).
          # We cannot change already-shipped clients, so the only lever for them is
          # to keep the CDN self-consistent: purge, then VERIFY every POP serves the
          # just-built manifest.json + krs.tar.gz, retrying; if a POP stays skewed,
          # FAIL the job (loud). The release is already published — red just signals
          # that old clients on a lagging POP are at risk.
          #
          # Caveats: jsdelivr is anycast (CI's edge != a user's edge) and purge is
          # unreliable for testingcf/gcore (observed: HTTP 200 but no flush), so
          # green here is necessary, not sufficient. NEW clients drop sha
          # verification entirely (k2 cb00194) and are immune to this skew — this
          # gate is purely a best-effort backstop for the OLD, still-verifying fleet.
          want_tar=$(sha256sum dist/krs.tar.gz | awk '{print $1}')
          want_manifest=$(sha256sum dist/manifest.json | awk '{print $1}')
          pops=(cdn fastly testingcf gcore)
          arts=(krs.tar.gz k2-rules.tar.gz VERSION manifest.json)

          purge_all() {
            for p in "${arts[@]}"; do
              echo "  purge: $p"
              curl -sS --max-time 20 --connect-timeout 5 -o /dev/null \
                "https://purge.jsdelivr.net/gh/kaitu-io/k2-rules@release/${p}" || true
            done
          }

          verify_all() {
            local bad=0
            for pop in "${pops[@]}"; do
              base="https://${pop}.jsdelivr.net/gh/kaitu-io/k2-rules@release"
              got_tar=$(curl -sSL --max-time 90 "${base}/krs.tar.gz" 2>/dev/null | sha256sum | awk '{print $1}')
              got_manifest=$(curl -sSL --max-time 30 "${base}/manifest.json" 2>/dev/null | sha256sum | awk '{print $1}')
              if [ "$got_tar" != "$want_tar" ]; then
                echo "  [$pop] krs.tar.gz STALE (got ${got_tar:0:12}, want ${want_tar:0:12})"; bad=1
              fi
              if [ "$got_manifest" != "$want_manifest" ]; then
                echo "  [$pop] manifest.json STALE (got ${got_manifest:0:12}, want ${want_manifest:0:12})"; bad=1
              fi
            done
            return $bad
          }

          for attempt in 1 2 3 4 5 6; do
            echo "=== purge+verify attempt ${attempt}/6 ==="
            purge_all
            sleep $((attempt * 15))
            if verify_all; then
              echo "OK: all POPs serve the just-built manifest.json + krs.tar.gz"
              exit 0
            fi
          done
          echo "FAIL: jsdelivr POPs still skewed after 6 attempts."
          echo "Release IS published (GitHub asset is authoritative); the CDN is"
          echo "inconsistent and OLD clients (which still verify the per-region sha)"
          echo "pinned to a lagging POP will brick. Re-run this workflow or purge"
          echo "manually until green."
          exit 1
