# app-bypass cn.yaml — bypass list for users in China.
#
# Compile source for the AndroidInstallers / AndroidApps / WindowsApps /
# DarwinApps sections inside dist/cn.krs. Not published to CDN as YAML
# (only the compiled .krs is served). Schema v2 — see app-bypass/README.md.
#
# Maintenance:
#   - android.installers: exact reverse-domain package names of app stores.
#     One entry covers every app installed via that store.
#   - android.apps: glob patterns with optional trailing `*` (case-sensitive).
#     Use `com.tencent.*` instead of `com.tencent` so unrelated namespaces
#     like `com.tencentlabs.foo` are NOT matched.
#   - windows.apps: glob patterns, case-INsensitive (lowercased at compile).
#   - darwin.apps: glob patterns, case-sensitive (macOS process basenames).

version: 2
region: cn
description: |
  Bypass list for users in China. Routes Chinese-ecosystem apps direct
  while the rest of the traffic continues through the VPN tunnel.

# ── Android ─────────────────────────────────────────────────────────
android:
  installers:
    - com.xiaomi.market
    - com.huawei.appmarket
    - com.bbk.appstore
    - com.oppo.market
    - com.heytap.market
    - com.tencent.android.qqdownloader
    - com.qihoo.appstore
    - com.baidu.appsearch
    - com.wandoujia.phoenix2
    - com.lenovo.leos.appstore
    - com.coolapk.market

  apps:
    # Exact-match payment/social apps with namespace shared by foreign apps.
    - com.eg.android.AlipayGphone
    - com.UCMobile
    - com.smile.gifmaker

    # Tier-1 internet
    - com.tencent.*
    - com.alipay.*
    - com.alibaba.*
    - com.taobao.*
    - com.tmall.*
    - com.baidu.*
    - com.bytedance.*
    - com.ss.android.*
    - com.netease.*
    - com.youdao.*
    - com.sina.*
    - com.weibo.*
    - com.qihoo.*
    - com.qihoo360.*

    # OEM Chinese-side
    - com.miui.*
    - com.xiaomi.*
    - com.huawei.*
    - com.bbk.*
    - com.oppo.*
    - com.heytap.*

    # Tools / content
    - com.iflytek.*
    - com.autonavi.*
    - com.amap.*
    - com.qiyi.*
    - com.iqiyi.*
    - com.youku.*
    - com.bilibili.*
    - com.zhihu.*

    # Lifestyle / transport
    - com.meituan.*
    - com.dianping.*
    - com.didi.*
    - com.didichuxing.*
    - com.kuaishou.*

    # E-commerce
    - com.jingdong.*
    - com.jd.*

    # Banking — keep anchored to com.* to avoid catching foreign apps with
    # bank-like short prefixes.
    - com.cmbchina.*
    - com.icbc.*
    - com.ICBC.*
    - com.ccb.*
    - com.boc.*

# ── Windows (case-insensitive; compiler lowercases) ────────────────
windows:
  apps:
    # Top Chinese-ecosystem desktop apps. Conservative starting set —
    # expand only after user-reported false-positives stay at zero.
    - WeChat*         # WeChat.exe, WeChatStart.exe, WeChatAppEx.exe
    - QQ*             # QQ.exe, QQMusic.exe, QQBrowser.exe
    - DingTalk*       # DingTalk.exe
    - Tencent*        # TencentMeeting.exe, TencentDocs.exe
    - Alipay*
    - Alibaba*

# ── macOS (case-sensitive) ─────────────────────────────────────────
darwin:
  apps:
    - WeChat*         # WeChat, WeChatHelper, WeChatAppEx
    - QQ*             # QQ
    - DingTalk*       # DingTalk
    - Tencent*        # TencentMeeting
    - Alipay*
    - Alibaba*
